<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Master Pro | Tıbbi İşletim Sistemi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #02040a;
            --panel-bg: rgba(10, 14, 23, 0.95);
            --accent-cyan: #00f2ff;
            --accent-pink: #ff007f;
            --glass-border: rgba(0, 242, 255, 0.15);
            --text-main: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 320px 1fr 380px;
        }

        /* --- ANA PANEL STİLLERİ --- */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            margin: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Sol Kontrol Paneli */
        #control-panel { grid-column: 1; }
        
        /* Orta Görsel Alan */
        #viewport-container { 
            grid-column: 2; 
            position: relative;
            background: radial-gradient(circle at center, #0a1428 0%, #02040a 100%);
            margin: 15px 0;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Sağ Veri Paneli */
        #data-panel { grid-column: 3; }

        /* Başlıklar */
        h1, h2, h3 { color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px; }
        .sub-text { font-size: 11px; color: #64748b; margin-bottom: 20px; font-family: 'JetBrains Mono'; }

        /* SVG Viewport */
        svg#master-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        svg#master-svg:active { cursor: grabbing; }

        /* Etkileşimli Parçalar */
        .anatomy-clickable {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 2px transparent);
        }
        .anatomy-clickable:hover {
            fill-opacity: 1 !important;
            stroke: #fff !important;
            stroke-width: 1.5px !important;
            filter: drop-shadow(0 0 8px var(--accent-cyan));
        }

        /* Katman Sliderları */
        .layer-control { margin-bottom: 20px; }
        .layer-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        input[type=range] { width: 100%; accent-color: var(--accent-cyan); cursor: pointer; }

        /* Bilgi Tablosu */
        .info-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .info-table td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .attr-name { color: var(--accent-cyan); font-weight: 600; width: 40%; }
    </style>
</head>
<body>

    <aside id="control-panel" class="panel">
        <div class="brand">
            <h2>Bio-Master <span style="color:var(--accent-pink)">PRO</span></h2>
            <div class="sub-text">v1.0.4 - Medical Visualization Engine</div>
        </div>

        <div class="layer-control">
            <div class="layer-label">OSTEOLOJİ (İskelet) <span id="val-skeletal">100%</span></div>
            <input type="range" id="input-skeletal" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="layer-control">
            <div class="layer-label">SPLANCHNOLOGY (Organlar) <span id="val-visceral">100%</span></div>
            <input type="range" id="input-visceral" min="0" max="1" step="0.01" value="1">
        </div>

        <div id="status-display" style="margin-top: auto; font-family: 'JetBrains Mono'; font-size: 12px; color: #4ade80;">
            <i class="fas fa-terminal"></i> <span id="terminal-text">Sistem hazır...</span>
        </div>
    </aside>

    <main id="viewport-container">
        <svg id="master-svg" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>
            
            <g id="main-group">
                <text x="400" y="600" fill="white" font-family="Arial" font-size="20" text-anchor="middle" id="loader-msg">
                    ANATOMİK VERİ BEKLENİYOR...
                </text>
            </g>
        </svg>
    </main>

    <aside id="data-panel" class="panel">
        <h3><i class="fas fa-microscope"></i> Analiz Paneli</h3>
        <div id="no-selection" style="margin-top: 40px; text-align: center; color: #64748b;">
            <i class="fas fa-hand-pointer fa-3x" style="margin-bottom: 20px; opacity: 0.3;"></i>
            <p>Lütfen incelemek istediğiniz yapıyı model üzerinden seçin.</p>
        </div>

        <div id="active-selection" style="display: none;">
            <h1 id="part-title" style="margin-top: 20px;">-</h1>
            <div id="part-latin" style="color: var(--accent-cyan); font-style: italic; margin-bottom: 15px;">-</div>
            
            <table class="info-table">
                <tr><td class="attr-name">Sistem</td><td id="info-system">-</td></tr>
                <tr><td class="attr-name">Fonksiyon</td><td id="info-func">-</td></tr>
                <tr><td class="attr-name">Bağlantılar</td><td id="info-conn">-</td></tr>
            </table>

            <div style="margin-top: 25px;">
                <h4 style="color: var(--accent-pink); margin-bottom: 10px;">KLİNİK NOTLAR</h4>
                <p id="info-desc" style="font-size: 13px; line-height: 1.6; color: #94a3b8;">-</p>
            </div>
        </div>
    </aside>

    <script>
        // ANA ENGINE JAVASCRIPT
        const state = {
            selectedPart: null,
            layers: { skeletal: 1, visceral: 1 }
        };

        // UI Güncelleme
        const terminal = document.getElementById('terminal-text');
        
        function log(msg) {
            terminal.innerText = `> ${msg}`;
        }

        // Katman Kontrolü
        document.getElementById('input-skeletal').oninput = (e) => {
            const v = e.target.value;
            document.getElementById('val-skeletal').innerText = Math.round(v * 100) + '%';
            // Gelecekteki iskelet grubu burayı dinleyecek
        };

        log("Modül 01: Çekirdek motor yüklendi.");
    </script>
</body>
