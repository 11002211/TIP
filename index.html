<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Master Pro | Advanced Medical Visualizer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #02040a;
            --panel-bg: rgba(10, 14, 23, 0.98);
            --accent-cyan: #00f2ff;
            --accent-pink: #ff007f;
            --glass-border: rgba(0, 242, 255, 0.15);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --highlight: rgba(0, 242, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 320px 1fr 380px; /* Üç sütunlu profesyonel layout */
        }

        /* --- SOL KONTROL PANELİ --- */
        #sidebar-left {
            background: var(--panel-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 10;
        }

        .brand h2 { font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; }
        .brand span { color: var(--accent-pink); }
        .version-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); margin-bottom: 40px; }

        .control-group { margin-bottom: 25px; background: var(--highlight); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); }
        .control-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 10px; color: var(--accent-cyan); }
        
        input[type=range] { 
            width: 100%; height: 4px; border-radius: 5px; 
            appearance: none; background: #1e293b; accent-color: var(--accent-cyan); cursor: pointer;
        }

        /* --- MERKEZİ GÖRÜNTÜLEYİCİ (VIEWPORT) --- */
        #main-viewport {
            position: relative;
            background: radial-gradient(circle at center, #0a1428 0%, #02040a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #master-svg {
            width: 100%;
            height: 95%;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.05));
        }

        /* Etkileşimli Parça Stilleri */
        .anatomy-clickable {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-linejoin: round;
        }
        .anatomy-clickable:hover {
            fill-opacity: 1 !important;
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            stroke: #fff !important;
            stroke-width: 1.5px !important;
        }

        /* --- SAĞ VERİ PANELİ --- */
        #sidebar-right {
            background: var(--panel-bg);
            border-left: 1px solid var(--glass-border);
            padding: 30px;
            overflow-y: auto;
        }

        .data-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--accent-cyan);
        }

        #part-name { font-size: 28px; font-weight: 800; margin-bottom: 5px; color: #fff; }
        #part-latin { font-style: italic; color: var(--accent-cyan); margin-bottom: 20px; font-size: 15px; }

        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .stats-table td { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .label { color: var(--text-dim); width: 100px; }

        /* Terminal Stili */
        #terminal {
            margin-top: auto;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #4ade80;
            border: 1px solid #1e293b;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .loading-state { animation: pulse 2s infinite; text-align: center; }

    </style>
</head>
<body>

    <aside id="sidebar-left">
        <div class="brand">
            <h2>BIO-MASTER <span>PRO</span></h2>
            <div class="version-tag">SYSTEM CORE v2.0.4 [STABLE]</div>
        </div>

        <div class="control-group">
            <div class="control-label">İSKELET SİSTEMİ <span id="val-skeletal">100%</span></div>
            <input type="range" id="slider-skeletal" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="control-group">
            <div class="control-label">ORGAN SİSTEMİ <span id="val-visceral">100%</span></div>
            <input type="range" id="slider-visceral" min="0" max="1" step="0.01" value="1">
        </div>

        <div id="terminal">
            <i class="fas fa-terminal"></i> > System Initialized...
        </div>
    </aside>

    <main id="main-viewport">
        <svg id="master-svg" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
            <g id="layer-skeletal" style="transition: opacity 0.5s ease;">
            
<g id="skull-complex">
    <path class="anatomy-clickable" 
          d="M320,150 c0,-45 30,-75 80,-75 s80,30 80,75 c0,25 -10,40 -25,50 l-110,0 c-15,-10 -25,-25 -25,-50" 
          fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"
          data-name="Frontal Kemik" 
          data-latin="Os Frontale" 
          data-system="İskelet / Nörokranium" 
          data-function="Beynin frontal lobunu korur ve alın yapısını oluşturur." 
          data-connection="Parietal, Sphenoid, Ethmoid, Nasal, Zygomatic" 
          data-description="Tek ve geniş bir kemiktir. Kaş çıkıntılarını (arcus superciliaris) barındırır." />

    <path class="anatomy-clickable" 
          d="M480,150 c0,-40 -10,-65 -35,-80 c45,5 75,40 75,80 c0,45 -25,75 -55,90 l15,-90" 
          fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"
          data-name="Parietal Kemik (Sağ)" 
          data-latin="Os Parietale" 
          data-system="İskelet / Nörokranium" 
          data-function="Kafatasının üst ve yan duvarlarını oluşturur." 
          data-connection="Frontal, Occipital, Temporal, Sphenoid" 
          data-description="Kafatasının en geniş kemiklerinden biridir. Sağ ve sol eşleniktir." />

    <path class="anatomy-clickable" 
          d="M320,150 c0,-40 10,-65 35,-80 c-45,5 -75,40 -75,80 c0,45 25,75 55,90 l-15,-90" 
          fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"
          data-name="Parietal Kemik (Sol)" 
          data-latin="Os Parietale" 
          data-system="İskelet / Nörokranium" 
          data-function="Beyin hemisferlerini üstten korur." 
          data-connection="Frontal, Occipital, Temporal, Sphenoid" 
          data-description="İki parietal kemik ortada Sagittal Sütür ile birleşir." />

    <path class="anatomy-clickable" 
          d="M470,200 c15,5 25,30 20,50 s-25,35 -45,30 l25,-80" 
          fill="#94a3b8" stroke="#64748b" stroke-width="1"
          data-name="Zygomatic Kemik (Sağ)" 
          data-latin="Os Zygomaticum" 
          data-system="İskelet / Visseroseranyum" 
          data-function="Yüzün lateral çıkıntısını ve göz çukuru (orbita) dış duvarını oluşturur." 
          data-connection="Maxilla, Frontal, Temporal, Sphenoid" 
          data-description="Halk arasında elmacık kemiği olarak bilinir." />

    <path class="anatomy-clickable" 
          d="M375,235 l50,0 l15,45 l-80,0 z" 
          fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"
          data-name="Maxilla" 
          data-latin="Os Maxilla" 
          data-system="İskelet / Visseroseranyum" 
          data-function="Üst dişleri taşır, damak ve burun tabanını oluşturur." 
          data-connection="Nasal, Zygomatic, Lacrimal, Ethmoid" 
          data-description="Sabittir. İçinde maksiller sinüs adı verilen boşluklar bulunur." />

    <path class="anatomy-clickable" 
          d="M370,290 l60,0 l20,40 c0,20 -20,35 -50,35 s-50,-15 -50,-35 z" 
          fill="#cbd5e1" stroke="#475569" stroke-width="2"
          data-name="Mandibula" 
          data-latin="Os Mandibula" 
          data-system="İskelet / Visseroseranyum" 
          data-function="Çiğneme ve konuşma. Alt dişleri taşır." 
          data-connection="Temporal (TMJ Eklemi)" 
          data-description="Kafatasının tek hareketli kemiğidir. Vücudun en güçlü kemiklerindendir." />
          
    <path class="anatomy-clickable" 
          d="M390,200 h20 l5,30 h-30 z" 
          fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"
          data-name="Nasal Kemik" 
          data-latin="Os Nasale" 
          data-system="İskelet" 
          data-function="Burun köprüsünü oluşturur." 
          data-connection="Frontal, Maxilla, Ethmoid" 
          data-description="İki küçük dikdörtgen kemikten oluşur." />
        </g>
    
            <g id="layer-visceral" style="transition: opacity 0.5s ease;">
                </g>
            </g>
                <g id="cervical-spine">
        <path class="anatomy-clickable" d="M380,335 h40 l5,10 h-50 z" fill="#f8fafc" stroke="#94a3b8" data-name="Atlas (C1)" data-latin="Vertebra Cervicalis I" data-system="İskelet / Aksiyel" data-function="Başın ağırlığını taşır." data-connection="Kafatası, Axis" data-description="Halka şeklindedir, gövdesi yoktur." />
        <path class="anatomy-clickable" d="M375,350 h50 l8,15 h-66 z" fill="#e2e8f0" stroke="#94a3b8" data-name="Axis (C2)" data-latin="Vertebra Cervicalis II" data-system="İskelet" data-function="Başın dönmesini sağlar." data-connection="Atlas, C3" data-description="Dens çıkıntısı ile pivot eklem yapar." />
        
        <path class="anatomy-clickable" d="M370,370 h60 l5,12 h-70 z" fill="#f1f5f9" stroke="#94a3b8" data-name="C3-C6 Omur Grubu" data-latin="Vertebrae Cervicales" data-system="İskelet" data-function="Boyun esnekliği ve desteği." data-connection="C2-C7" data-description="Boyun kavisini (lordoz) oluştururlar." />
        
        <path class="anatomy-clickable" d="M358,442 h84 l10,18 h-104 z" fill="#94a3b8" stroke="#475569" data-name="C7 (Prominens)" data-latin="Vertebra Cervicalis VII" data-system="İskelet" data-function="Sırt geçiş noktası." data-connection="C6, T1" data-description="Ensede en çok çıkıntı yapan kemiktir." />
        
        <g opacity="0.6" fill="#00f2ff">
            <rect x="385" y="347" width="30" height="2" rx="1" />
            <rect x="378" y="367" width="44" height="2" rx="1" />
            <rect x="372" y="385" width="56" height="2" rx="1" />
            <rect x="368" y="403" width="64" height="2" rx="1" />
        </g>
                </g>
            
        </svg>
    </main>

    <aside id="sidebar-right">
        <div id="no-selection-msg">
            <h3 style="color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px;">Analiz Bekleniyor</h3>
            <p style="color: var(--text-dim); font-size: 14px; margin-top: 10px;">Lütfen tarama yapmak için bir anatomik yapı seçin.</p>
        </div>

        <div id="data-content" style="display: none;">
            <div id="part-name">YAPI ADI</div>
            <div id="part-latin">Terminologia Anatomica</div>
            
            <div class="data-card">
                <table class="stats-table">
                    <tr><td class="label">Sistem:</td><td id="info-system">-</td></tr>
                    <tr><td class="label">Fonksiyon:</td><td id="info-function">-</td></tr>
                    <tr><td class="label">Bağlantı:</td><td id="info-connection">-</td></tr>
                </table>
            </div>

            <div style="margin-top: 30px;">
                <h4 style="color: var(--accent-pink); font-size: 12px; letter-spacing: 2px; margin-bottom: 10px;">KLİNİK NOTLAR</h4>
                <p id="info-description" style="font-size: 14px; line-height: 1.6; color: var(--text-dim);"></p>
            </div>
        </div>
    </aside>

    <script>
        /**
         * BIO-MASTER CORE ENGINE
         * Bu betik, ileride eklenecek tüm modüllerin beynidir.
         */
        const BioMaster = {
            init() {
                this.setupEventListeners();
                this.log("Core Engine v2.0 is online.");
            },

            log(msg) {
                const term = document.querySelector('#terminal');
                term.innerHTML = `<i class="fas fa-terminal"></i> > ${msg}`;
            },

            setupEventListeners() {
                // Tıklama Dinleyicisi (Delegasyon - Performans için)
                document.getElementById('master-svg').addEventListener('click', (e) => {
                    const target = e.target.closest('.anatomy-clickable');
                    if (target) this.showDetails(target);
                });

                // İskelet Slider
                document.getElementById('slider-skeletal').addEventListener('input', (e) => {
                    const val = e.target.value;
                    document.getElementById('layer-skeletal').style.opacity = val;
                    document.getElementById('val-skeletal').innerText = Math.round(val * 100) + '%';
                });

                // Organ Slider
                document.getElementById('slider-visceral').addEventListener('input', (e) => {
                    const val = e.target.value;
                    document.getElementById('layer-visceral').style.opacity = val;
                    document.getElementById('val-visceral').innerText = Math.round(val * 100) + '%';
                });
            },

            showDetails(el) {
                const data = el.dataset;
                document.getElementById('no-selection-msg').style.display = 'none';
                document.getElementById('data-content').style.display = 'block';

                document.getElementById('part-name').innerText = data.name || 'Bilinmiyor';
                document.getElementById('part-latin').innerText = data.latin || 'N/A';
                document.getElementById('info-system').innerText = data.system || '-';
                document.getElementById('info-function').innerText = data.function || '-';
                document.getElementById('info-connection').innerText = data.connection || '-';
                document.getElementById('info-description').innerText = data.description || 'Veri bulunamadı.';

                this.log(`Analyzing: ${data.name}`);
            }
        };

        // Motoru Başlat
        window.onload = () => BioMaster.init();
    </script>
</body>
                </html>
